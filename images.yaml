---
bootc-base: &bootc-base
  cppFlags: []
  description: "Construction-Grade Linux - Bootc Debian Image for Developers"
  name: knotty-pine
  org: johnmertz
  registry: ghcr.io
  repo: knotty-pine
  product: knotty-pine
  upstream: debian
desktop-base: &desktop-base
  <<: *bootc-base
  cppFlags: ["DESKTOP"]
  product: desktop
  default: true
server-base: &server-base
  <<: *bootc-base
  cppFlags: ["SERVER"]
  product: server
  default: false
version-13: &version-13
  source: ghcr.io/spamtagger/debian-bootc-core:latest
  version: 13
version-14: &version-14
  source: ghcr.io/spamtagger/debian-bootc-core:testing
  version: 14

defaults:
  variant: desktop
  version: 13

images:
  desktop-13:
    !!merge <<: 
      - *version-13
      - *desktop-base
  server-13:
    !!merge <<:
      - *version-13
      - *server-base
  rechunker:
    # TODO: Add Renovate Regex configuration
    source: ghcr.io/hhd-dev/rechunk:v1.2.2@sha256:e799d89f9a9965b5b0e89941a9fc6eaab62e9d2d73a0bfb92e6a495be0706907
  bootc-image-builder:
    # TODO: Add Renovate Regex configuration
    source: quay.io/centos-bootc/bootc-image-builder:latest
  qemu:
    # TODO: Add Renovate Regex configuration
    source: ghcr.io/qemus/qemu:7.12@sha256:ab767a6b9c8cf527d521eee9686dce09933bc35599ee58be364eb8f3a03001ea
